name: Sync concert sources

on:
  workflow_dispatch:
  schedule:
    # Every 4 hours. In Hong Kong time: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00.
    - cron: "0 */4 * * *"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GCLOUD_PROJECT: jpop-hk-concerts
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check source availability
        run: npm run check:sources -- --report source-checks.json

      - name: Sync verified concert data to Firestore
        run: npm run sync:sources -- --source-check-report source-checks.json
