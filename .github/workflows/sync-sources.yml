name: Sync concert sources

on:
  workflow_dispatch:
  schedule:
    # 22:00 UTC = 06:00 Hong Kong time.
    - cron: "0 22 * * *"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GCLOUD_PROJECT: jpop-hk-concerts
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check source availability
        run: npm run check:sources

      - name: Sync verified concert data to Firestore
        run: npm run sync:sources
